services:
  db:
    image: postgres:16-alpine
    container_name: luizaeian_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luizaeian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luizaeian"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - luizaeian_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luizaeian_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/luizaeian
      - DEBUG=true
      - ENVIRONMENT=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - luizaeian_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: luizaeian_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    networks:
      - luizaeian_network

volumes:
  postgres_data:

networks:
  luizaeian_network:
    driver: bridge
